<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Dots</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #141414;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .map-container {
      position: relative;
      width: 940px;
      height: 693px;
    }

    .map-container svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* ── Dot wrapper ── */
    .dot-wrapper {
      position: absolute;
      transform: translate(-50%, -50%);
      display: inline-block;
      z-index: 10;
    }

    .blue-dot {
      width: 16px;
      height: 16px;
      background-color: #0034C3;
      border-radius: 50%;
      cursor: pointer;
      display: block;
    }

    .tooltip {
      position: absolute;
      bottom: 130%;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 8px 16px;
      border-radius: 20px;
      white-space: nowrap;
      font-size: 14px;
      font-family: sans-serif;
      color: #111;
      pointer-events: none;
      z-index: 100;

      /* Прихований за замовчуванням */
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }

    /* Стрілка вниз */
    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: white;
    }

    /* Показуємо при наведенні */
    .dot-wrapper:hover .tooltip {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>
